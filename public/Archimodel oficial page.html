<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchiModel | Impresión 3D para Estudiantes de Arquitectura</title>
    
    <!-- Cargar Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Cargar FontAwesome para los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Tipografía Moderna y Accesible -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Cargar React y ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Cargar Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        campus: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            500: '#3b82f6', /* Azul vibrante estudiantil */
                            600: '#2563eb',
                            900: '#1e3a8a',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased;
            background-color: #f8fafc; /* Fondo claro */
            color: #0f172a;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #3b82f6; }
        
        .glass-nav {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .text-gradient {
            background: linear-gradient(to right, #2563eb, #1e3a8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="overflow-x-hidden">
    <div id="root" class="min-h-screen"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, size = 18, className = '' }) => {
            return <i className={`fa-solid fa-${name} ${className}`} style={{ fontSize: `${size}px` }}></i>;
        };

        // Componente especial para renderizar las imágenes según las instrucciones
        const WebImage = ({ item, className = "" }) => (
            <div className={`flex items-center justify-center bg-blue-50 border-2 border-dashed border-blue-200 text-blue-700 font-medium p-6 text-center shadow-inner ${className}`}>
                [Image of {item}]
            </div>
        );

        const App = () => {
            // Vistas: 'home' (Página principal), 'quote' (Cotizador), 'portal' (Dashboard del Estudiante)
            const [currentView, setCurrentView] = useState('home');
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 20);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="flex flex-col min-h-screen">
                    {/* Navegación Global */}
                    <nav className={`fixed w-full z-50 transition-all duration-300 ${scrolled || currentView !== 'home' ? 'glass-nav py-3 shadow-sm' : 'bg-transparent py-5'}`}>
                        <div className="max-w-7xl mx-auto px-6 md:px-12 flex justify-between items-center">
                            <div 
                                className="cursor-pointer flex items-center gap-2"
                                onClick={() => setCurrentView('home')}
                            >
                                <div className="bg-campus-600 text-white p-2 rounded-lg">
                                    <Icon name="cube" size={20} />
                                </div>
                                <span className={`font-black text-xl tracking-tight ${scrolled || currentView !== 'home' ? 'text-slate-900' : 'text-slate-900'}`}>
                                    Archi<span className="text-campus-600">Model</span>
                                </span>
                            </div>

                            <div className={`hidden md:flex items-center gap-8 text-sm font-semibold transition-colors ${scrolled || currentView !== 'home' ? 'text-slate-600' : 'text-slate-700'}`}>
                                <button onClick={() => setCurrentView('home')} className="hover:text-campus-600 transition-colors">Inicio</button>
                                <button onClick={() => setCurrentView('portal')} className="hover:text-campus-600 transition-colors">Mi Taller (Portal)</button>
                                <button 
                                    onClick={() => setCurrentView('quote')} 
                                    className="bg-campus-600 text-white px-5 py-2.5 rounded-full hover:bg-campus-700 hover:shadow-lg hover:shadow-blue-500/30 transition-all duration-300 flex items-center gap-2"
                                >
                                    <Icon name="upload" size={14} /> Cotizar Archivo
                                </button>
                            </div>
                            
                            <button className="md:hidden text-slate-800"><Icon name="bars" size={24} /></button>
                        </div>
                    </nav>

                    {/* Enrutamiento de Contenido */}
                    <main className="flex-1 flex flex-col pt-20">
                        {currentView === 'home' && <HomeView setView={setCurrentView} />}
                        {currentView === 'quote' && <QuoteEngineView />}
                        {currentView === 'portal' && <StudentPortalView />}
                    </main>
                </div>
            );
        };

        /* -------------------------------------------------------------------------- */
        /* 1. PÁGINA PRINCIPAL ESTUDIANTIL (Home)                                     */
        /* -------------------------------------------------------------------------- */
        const HomeView = ({ setView }) => (
            <div className="w-full flex flex-col -mt-20">
                {/* Hero Section */}
                <section className="relative pt-32 pb-20 lg:pt-48 lg:pb-32 flex items-center justify-center overflow-hidden bg-white">
                    <div className="absolute inset-0 z-0 opacity-30">
                        <div className="absolute top-0 -left-4 w-72 h-72 bg-blue-300 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob"></div>
                        <div className="absolute top-0 -right-4 w-72 h-72 bg-cyan-300 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob animation-delay-2000"></div>
                        <div className="absolute -bottom-8 left-20 w-72 h-72 bg-blue-400 rounded-full mix-blend-multiply filter blur-2xl opacity-70 animate-blob animation-delay-4000"></div>
                    </div>
                    
                    <div className="relative z-10 max-w-7xl mx-auto px-6 grid lg:grid-cols-2 gap-12 items-center">
                        <div className="text-left space-y-8">
                            <div className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-blue-100 text-blue-700 text-xs font-bold uppercase tracking-wide">
                                <Icon name="bolt" size={12} /> Descuentos para Estudiantes
                            </div>
                            <h1 className="text-5xl md:text-6xl font-black tracking-tight text-slate-900 leading-[1.1]">
                                Salva tu <span className="text-gradient">Entrega Final.</span>
                            </h1>
                            <p className="text-slate-500 text-lg md:text-xl font-medium max-w-lg leading-relaxed">
                                Impresión 3D rápida, accesible y sin dolores de cabeza. Nos encargamos de tu maqueta para que tú puedas terminar tus planos.
                            </p>
                            <div className="flex flex-col sm:flex-row gap-4">
                                <button 
                                    onClick={() => setView('quote')}
                                    className="bg-campus-600 text-white px-8 py-4 rounded-xl text-base font-bold shadow-lg shadow-blue-500/30 hover:bg-campus-700 hover:-translate-y-1 transition-all"
                                >
                                    Cotizar mi Maqueta
                                </button>
                                <button 
                                    onClick={() => setView('portal')}
                                    className="bg-white text-slate-700 border-2 border-slate-200 px-8 py-4 rounded-xl text-base font-bold hover:border-campus-500 hover:text-campus-600 transition-all"
                                >
                                    Ver mis Impresiones
                                </button>
                            </div>
                        </div>

                        {/* Hero Image Placeholder */}
                        <div className="relative w-full h-[400px] lg:h-[500px] rounded-2xl overflow-hidden shadow-2xl rotate-2 hover:rotate-0 transition-transform duration-500">
                            <img
                            src= "public/assets/impresion-en-3d.jpg" 
                                item="impresora, imprimiendo modelo 3d" 
                                className="w-full h-full text-xl"
                            />
                        </div>
                    </div>
                </section>

                {/* Features para Estudiantes */}
                <section className="py-20 bg-slate-50 border-y border-slate-200">
                    <div className="max-w-7xl mx-auto px-6 grid md:grid-cols-3 gap-12">
                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 space-y-4 hover:shadow-md transition-shadow">
                            <div className="w-12 h-12 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center mb-6">
                                <Icon name="wallet" size={24} />
                            </div>
                            <h3 className="text-xl font-bold text-slate-900">Precios de Estudiante</h3>
                            <p className="text-slate-600 text-sm leading-relaxed">Con tu ID universitario obtienes tarifas reducidas. Materiales económicos como PLA para volumetrías y pruebas de concepto.</p>
                        </div>
                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 space-y-4 hover:shadow-md transition-shadow">
                            <div className="w-12 h-12 bg-green-100 text-green-600 rounded-xl flex items-center justify-center mb-6">
                                <Icon name="screwdriver-wrench" size={24} />
                            </div>
                            <h3 className="text-xl font-bold text-slate-900">Arreglamos tus Mallas</h3>
                            <p className="text-slate-600 text-sm leading-relaxed">¿Tu modelo de SketchUp tiene errores? Nuestro equipo revisa y repara la geometría básica gratis antes de imprimir.</p>
                        </div>
                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 space-y-4 hover:shadow-md transition-shadow">
                            <div className="w-12 h-12 bg-orange-100 text-orange-600 rounded-xl flex items-center justify-center mb-6">
                                <Icon name="fire" size={24} />
                            </div>
                            <h3 className="text-xl font-bold text-slate-900">Entregas de Emergencia</h3>
                            <p className="text-slate-600 text-sm leading-relaxed">Semana de entregas o jurados. Ofrecemos fila rápida (Express) para que no te quedes sin maqueta a último minuto.</p>
                        </div>
                    </div>
                </section>

                {/* Galería de Tipos de Impresión */}
                <section className="py-24 bg-white">
                    <div className="max-w-7xl mx-auto px-6">
                        <div className="text-center mb-16">
                            <h2 className="text-3xl font-black text-slate-900 mb-4">Soluciones para cada Taller</h2>
                            <p className="text-slate-500 max-w-2xl mx-auto">Desde la primera idea conceptual hasta la maqueta de tesis final.</p>
                        </div>
                        
                        <div className="grid md:grid-cols-2 gap-8">
                            <div className="group rounded-2xl overflow-hidden bg-slate-100 border border-slate-200 hover:shadow-xl transition-all">
                                <div className="h-64 relative overflow-hidden">
                                    <img
                                    src="public/assets/pla.jpg" 
                                        item="maqueta conceptual de edificio impresa en PLA blanco mate con estructura visible" 
                                        className="absolute inset-0 w-full h-full"
                                    />
                                </div>
                                <div className="p-8">
                                    <div className="flex justify-between items-center mb-2">
                                        <h4 className="text-xl font-bold text-slate-900">Maqueta de Estudio (PLA)</h4>
                                        <span className="bg-slate-200 text-slate-700 text-xs font-bold px-2 py-1 rounded">Más Económico</span>
                                    </div>
                                    <p className="text-slate-600 text-sm mb-4">Perfecto para volumetrías, análisis de sitio y revisiones semanales. Rápido y barato.</p>
                                    <ul className="text-sm text-slate-500 space-y-2">
                                        <li><Icon name="check" className="text-green-500 mr-2" /> Plástico biodegradable</li>
                                        <li><Icon name="check" className="text-green-500 mr-2" /> Líneas de capa visibles</li>
                                    </ul>
                                </div>
                            </div>

                            <div className="group rounded-2xl overflow-hidden bg-slate-100 border border-slate-200 hover:shadow-xl transition-all">
                                <div className="h-64 relative overflow-hidden">
                                    <img
                                    src="public/assets/resina.jpg"
                                        item="maqueta arquitectónica detallada de alta resolución impresa en resina translúcida y gris mostrando ventanales" 
                                        className="absolute inset-0 w-full h-full"
                                    />
                                </div>
                                <div className="p-8">
                                    <div className="flex justify-between items-center mb-2">
                                        <h4 className="text-xl font-bold text-slate-900">Entrega Final (Resina SLA)</h4>
                                        <span className="bg-blue-100 text-blue-700 text-xs font-bold px-2 py-1 rounded">Alta Precisión</span>
                                    </div>
                                    <p className="text-slate-600 text-sm mb-4">Superficies lisas, detalles milimétricos (pérgolas, cancelería). Ideal para la tesis o el jurado final.</p>
                                    <ul className="text-sm text-slate-500 space-y-2">
                                        <li><Icon name="check" className="text-green-500 mr-2" /> Textura lisa profesional</li>
                                        <li><Icon name="check" className="text-green-500 mr-2" /> Permite piezas diminutas</li>
                                    </ul>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            </div>
        );

        /* -------------------------------------------------------------------------- */
        /* 2. COTIZADOR ESTUDIANTIL (App)                                             */
        /* -------------------------------------------------------------------------- */
        const QuoteEngineView = () => {
            const [scale, setScale] = useState('1:100');
            const [material, setMaterial] = useState('PLA Blanco (Económico)');
            const [serviceTier, setServiceTier] = useState('draft');
            const [isExpress, setIsExpress] = useState(false);
            const [isStudent, setIsStudent] = useState(true);

            // Precios ajustados a bolsillo estudiantil
            let baseCost = 15.00; // Base económica
            
            if (scale === '1:50') baseCost *= 1.5;
            if (material.includes('Resina')) baseCost *= 2.2;
            if (serviceTier === 'final') baseCost += 15.00; // Lijado básico
            if (isExpress) baseCost += 12.00; // Rush fee fijo
            if (isStudent) baseCost *= 0.8; // 20% descuento estudiantil

            return (
                <div className="flex-1 flex flex-col lg:flex-row max-w-[1400px] w-full mx-auto p-4 md:p-8 gap-8">
                    {/* Visualización del Archivo */}
                <div className="flex-1 rounded-2xl overflow-hidden shadow-sm border border-slate-200 bg-white flex flex-col min-h-[50vh]">
<div className="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
    <div className="flex items-center gap-3">
        <div className="bg-blue-100 p-2 rounded-lg text-blue-600">
            <Icon name="cube" size={20} />
        </div>
        <div>
            <p className="text-sm font-bold text-slate-800">PABELLON_FINAL_V3.STL</p>
            <p className="text-xs text-slate-500">Volumen detectado: 125 cm³</p>
        </div>
    </div>
    <span className="px-3 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full">Listo para imprimir</span>
</div>

<div className="flex-1 relative bg-slate-100 p-4">
    <img 
        src="public/assets/Render_01_030000.jpg"
        alt="Render arquitectónico del pabellón final mostrando la geometría 3D"
        className="w-full h-full min-h-[400px] rounded-xl border border-slate-200 shadow-inner object-cover"
    />
                        
                        {/* Herramientas superpuestas */}
                        <div className="absolute bottom-8 right-8 flex flex-col gap-2">
                            <button className="w-10 h-10 bg-white rounded-full shadow-md flex items-center justify-center text-slate-600 hover:text-blue-600"><Icon name="plus" /></button>
                            <button className="w-10 h-10 bg-white rounded-full shadow-md flex items-center justify-center text-slate-600 hover:text-blue-600"><Icon name="minus" /></button>
                            <button className="w-10 h-10 bg-white rounded-full shadow-md flex items-center justify-center text-slate-600 hover:text-blue-600"><Icon name="rotate" /></button>
                        </div>
                    </div>
                </div>

                    {/* Formulario de Cotización */}
                    <div className="w-full lg:w-[450px] bg-white rounded-2xl shadow-lg border border-slate-200 flex flex-col shrink-0 overflow-hidden">
                        <div className="p-6 border-b border-slate-100 bg-slate-50">
                            <h2 className="text-xl font-bold text-slate-900">Opciones de Impresión</h2>
                            <p className="text-sm text-slate-500 mt-1">Configura tu modelo para el taller.</p>
                        </div>

                        <div className="p-6 space-y-6 flex-1 overflow-y-auto">
                            <div className="space-y-3">
                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wide">Escala</label>
                                <select 
                                    value={scale} onChange={(e) => setScale(e.target.value)}
                                    className="w-full text-sm p-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white font-medium"
                                >
                                    <option>1/16"- 1'</option>
                                    <option>1/8"- 1'</option>
                                    <option>1/4"- 1'</option>
                                    <option>1/2"- 1'</option>
                                    <option>1"- 1'</option>
                                </select>
                            </div>

                            <div className="space-y-3">
                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wide">Tecnología & Material</label>
                                <select 
                                    value={material} onChange={(e) => setMaterial(e.target.value)}
                                    className="w-full text-sm p-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all bg-white font-medium"
                                >
                                    <option>PLA Blanco (Económico - Volumetrías)</option>
                                    <option>PLA Gris (Contraste de sombras)</option>
                                    <option>Resina SLA Alta Precisión (Detalles finos)</option>
                                </select>
                            </div>

                            <div className="space-y-3 pt-4 border-t border-slate-100">
                                <label className="text-xs font-bold text-slate-500 uppercase tracking-wide">Acabado Post-Impresión</label>
                                
                                <button 
                                    onClick={() => setServiceTier('draft')}
                                    className={`w-full p-4 rounded-xl text-left border-2 transition-all flex justify-between items-center ${serviceTier === 'draft' ? 'border-blue-500 bg-blue-50' : 'border-slate-100 hover:border-slate-200'}`}
                                >
                                    <div>
                                        <span className={`block text-sm font-bold ${serviceTier === 'draft' ? 'text-blue-900' : 'text-slate-700'}`}>Solo Quitar Soportes</span>
                                        <span className="block text-xs text-slate-500 mt-1">Ideal para maquetas de estudio. Lijas tú.</span>
                                    </div>
                                    {serviceTier === 'draft' && <Icon name="circle-check" size={18} className="text-blue-600"/>}
                                </button>
                                
                                <button 
                                    onClick={() => setServiceTier('final')}
                                    className={`w-full p-4 rounded-xl text-left border-2 transition-all flex justify-between items-center ${serviceTier === 'final' ? 'border-blue-500 bg-blue-50' : 'border-slate-100 hover:border-slate-200'}`}
                                >
                                    <div>
                                        <span className={`block text-sm font-bold flex items-center gap-2 ${serviceTier === 'final' ? 'text-blue-900' : 'text-slate-700'}`}>
                                            Listo para el Jurado <Icon name="star" size={12} className="text-orange-400" />
                                        </span>
                                        <span className="block text-xs text-slate-500 mt-1">Lijado básico e imprimación blanca mate.</span>
                                    </div>
                                    {serviceTier === 'final' && <Icon name="circle-check" size={18} className="text-blue-600"/>}
                                </button>
                            </div>

                            <div className="space-y-3 pt-4 border-t border-slate-100">
                                <div 
                                    onClick={() => setIsExpress(!isExpress)}
                                    className={`cursor-pointer rounded-xl flex items-center justify-between p-4 border-2 transition-all ${isExpress ? 'border-orange-400 bg-orange-50' : 'border-slate-100'}`}
                                >
                                    <div className="flex items-center gap-3">
                                        <div className={`p-2 rounded-full ${isExpress ? 'bg-orange-100 text-orange-600' : 'bg-slate-100 text-slate-400'}`}>
                                            <Icon name="fire" />
                                        </div>
                                        <div>
                                            <p className="text-sm font-bold text-slate-800">¡Entrega Mañana!</p>
                                            <p className="text-xs text-slate-500 mt-0.5">Producción Express (Saltar la fila)</p>
                                        </div>
                                    </div>
                                    <div className={`w-5 h-5 rounded border flex items-center justify-center ${isExpress ? 'bg-orange-500 border-orange-500 text-white' : 'border-slate-300'}`}>
                                        {isExpress && <Icon name="check" size={10} />}
                                    </div>
                                </div>

                                <div 
                                    onClick={() => setIsStudent(!isStudent)}
                                    className={`cursor-pointer rounded-xl flex items-center justify-between p-4 border-2 transition-all ${isStudent ? 'border-green-400 bg-green-50' : 'border-slate-100'}`}
                                >
                                    <div className="flex items-center gap-3">
                                        <div className={`p-2 rounded-full ${isStudent ? 'bg-green-100 text-green-600' : 'bg-slate-100 text-slate-400'}`}>
                                            <Icon name="id-card" />
                                        </div>
                                        <div>
                                            <p className="text-sm font-bold text-slate-800">Soy Estudiante (20% OFF)</p>
                                            <p className="text-xs text-slate-500 mt-0.5">Requiere foto de ID al pagar</p>
                                        </div>
                                    </div>
                                    <div className={`w-5 h-5 rounded border flex items-center justify-center ${isStudent ? 'bg-green-500 border-green-500 text-white' : 'border-slate-300'}`}>
                                        {isStudent && <Icon name="check" size={10} />}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Totales */}
                        <div className="p-6 bg-slate-900 text-white mt-auto rounded-b-xl">
                            <div className="flex justify-between items-end mb-4">
                                <div>
                                    <p className="text-xs text-slate-400 font-medium mb-1">Recogida en Edificio Forteza:</p>
                                    <div className="text-sm font-bold text-green-400 flex items-center gap-1">
                                        <Icon name="clock" size={12} /> {isExpress ? 'Mañana, 8:00 AM' : 'Jueves, 2:00 PM'}
                                    </div>
                                </div>
                                <div className="text-right">
                                    {isStudent && <p className="text-xs text-slate-400 line-through mb-1">${(baseCost / 0.8).toFixed(2)}</p>}
                                    <span className="text-3xl font-black">${baseCost.toFixed(2)}</span>
                                </div>
                            </div>
                            <button className="w-full bg-campus-600 hover:bg-campus-500 text-white font-bold py-4 rounded-xl transition-colors shadow-lg shadow-blue-500/20">
                                Enviar al Taller y Pagar
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        /* -------------------------------------------------------------------------- */
        /* 3. PORTAL DEL ESTUDIANTE (Dashboard)                                       */
        /* -------------------------------------------------------------------------- */
        const StudentPortalView = () => (
            <div className="flex-1 bg-slate-50 p-4 md:p-8 overflow-y-auto">
                <div className="max-w-6xl mx-auto space-y-8">
                    
                    {/* Header del Estudiante */}
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col md:flex-row justify-between items-center gap-4">
                        <div className="flex items-center gap-4">
